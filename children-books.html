<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Raea Gragg — Children’s Books</title>
  <meta name="description" content="Children’s book portfolio by Raea Gragg." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&family=Albert+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo">Raea Gragg<small>Author • Illustrator • Animator</small></div>
      <nav aria-label="Primary">
        <a href="./index.html">Home</a>
        <a class="active" href="./books.html">Books</a>
        <a href="./art.html">Art</a>
        <a href="./projects.html">Upcoming</a>
        <a href="./about.html">About</a>
      </nav>
    </header>

    <main>
      <section>
        <h2>Children’s Books</h2>
        <p class="story-intro">Choose a cover to open the full book gallery.</p>

        <div class="book-grid-covers">
          <div class="cover-tile">
            <button type="button" class="cover-button" onclick="openBook('4-paws')">
              <span class="sr-only">Open 4 Paws</span>
              <img src="./assets/Children%20books/4%20paws/four%20paws%20front%20cover.jpg" alt="4 Paws cover" />
              <span class="open-hint">Open</span>
            </button>
            <div class="cover-meta"><span class="cover-title">4 Paws</span><a class="cover-buy" href="https://us.amazon.com/Four-Paws-Raea-Gragg/dp/0991626907" target="_blank" rel="noopener">Amazon</a></div>
          </div>

          <div class="cover-tile">
            <button type="button" class="cover-button" onclick="openBook('little-coconut-island')">
              <span class="sr-only">Open Little Coconut Island</span>
              <img src="./assets/Children%20books/little%20coconut%20island/Lilcoco%20jpegs%20for%20web.jpg" alt="Little Coconut Island cover" />
              <span class="open-hint">Open</span>
            </button>
            <div class="cover-meta"><span class="cover-title">Little Coconut Island</span><a class="cover-buy" href="https://www.amazon.com/Raea-Gragg/e/B00IH1GVZC" target="_blank" rel="noopener">Amazon</a></div>
          </div>

          <div class="cover-tile">
            <button type="button" class="cover-button" onclick="openBook('manu-o-ku')">
              <span class="sr-only">Open The Secret of the Manu-o-ku</span>
              <img src="./assets/Children%20books/The%20secret%20of%20the%20Manu-o-ku/507c35_b5d9fc08a7ba4aef8be5175e0735bc5f~mv2.jpg" alt="The Secret of the Manu-o-ku cover" />
              <span class="open-hint">Open</span>
            </button>
            <div class="cover-meta"><span class="cover-title">The Secret of the Manu-o-ku</span><a class="cover-buy" href="https://www.amazon.com/Raea-Gragg/e/B00IH1GVZC" target="_blank" rel="noopener">Amazon</a></div>
          </div>

          <div class="cover-tile">
            <button type="button" class="cover-button" onclick="openBook('dogs')">
              <span class="sr-only">Open Dogs</span>
              <img src="./assets/Children%20books/dogs/507c35_25c6b22866704e4883ec792fd40107c9~mv2_d_3300_2550_s_4_2.jpg" alt="Dogs cover" />
              <span class="open-hint">Open</span>
            </button>
            <div class="cover-meta"><span class="cover-title">Dogs</span><a class="cover-buy" href="https://www.amazon.com/Raea-Gragg/e/B00IH1GVZC" target="_blank" rel="noopener">Amazon</a></div>
          </div>

          <div class="cover-tile">
            <button type="button" class="cover-button" onclick="openBook('nibbler')">
              <span class="sr-only">Open Nibbler</span>
              <img src="./assets/Children%20books/Nibbler/1.jpg" alt="Nibbler cover" />
              <span class="open-hint">Open</span>
            </button>
            <div class="cover-meta"><span class="cover-title">Nibbler</span><a class="cover-buy" href="https://www.amazon.com/Raea-Gragg/e/B00IH1GVZC" target="_blank" rel="noopener">Amazon</a></div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div>© <span id="year"></span> Raea Gragg</div>
      <div><a href="./books.html">Back to Books</a></div>
    </footer>
  </div>

  <div id="bookModal" class="book-modal" aria-hidden="true">
    <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-count" id="modalCount"></div>
    <div class="book-modal-inner">
      <button class="modal-nav" id="modalPrev" aria-label="Previous image">←</button>
      <div class="book-modal-stage"><img id="modalImage" alt="" /></div>
      <button class="modal-nav" id="modalNext" aria-label="Next image">→</button>
    </div>
  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const books = {
      '4-paws': {
        title: '4 Paws',
        images: [
          './assets/Children%20books/4%20paws/507c35_31147543d5824737b1123a5a65adfad6~mv2_d_4500_4500_s_4_2.jpg',
          './assets/Children%20books/4%20paws/507c35_4ab8b6af02b44ca69f9e39999ee40adb~mv2_d_4500_4500_s_4_2.jpg',
          './assets/Children%20books/4%20paws/507c35_6f175e2259a04b00b3dd371b8967ae5f~mv2_d_4500_4500_s_4_2.jpg',
          './assets/Children%20books/4%20paws/507c35_7e8c6aec41b34511b7b4ab061e26d094~mv2_d_4500_4500_s_4_2.jpg'
        ]
      },
      'little-coconut-island': {
        title: 'Little Coconut Island',
        images: [
          './assets/Children%20books/little%20coconut%20island/507c35_44fcd2253c2942c48d64ebaa113ac29e~mv2_d_4500_4500_s_4_2.jpg',
          './assets/Children%20books/little%20coconut%20island/507c35_a74f81e300314f0b88dee70b37adbace~mv2_d_4500_4500_s_4_2.jpg',
          './assets/Children%20books/little%20coconut%20island/507c35_b59a2c7231ff454a830bd7fc1bdab396~mv2_d_4500_4500_s_4_2.jpg',
          './assets/Children%20books/little%20coconut%20island/507c35_dfd8a95bcc9541148031bc6fb50d21c8~mv2_d_4500_4500_s_4_2.jpg'
        ]
      },
      'manu-o-ku': {
        title: 'The Secret of the Manu-o-ku',
        images: [
          './assets/Children%20books/The%20secret%20of%20the%20Manu-o-ku/507c35_b5d9fc08a7ba4aef8be5175e0735bc5f~mv2.jpg',
          './assets/Children%20books/The%20secret%20of%20the%20Manu-o-ku/507c35_b5f3ea3d9018436c84f71111385d89f4~mv2.jpg',
          './assets/Children%20books/The%20secret%20of%20the%20Manu-o-ku/507c35_c44d76b285ad402799be97ae487ef9f6~mv2.jpg',
          './assets/Children%20books/The%20secret%20of%20the%20Manu-o-ku/507c35_e43cf68815b44657a60e939a2ec7f487~mv2.jpg',
          './assets/Children%20books/The%20secret%20of%20the%20Manu-o-ku/507c35_ecaa57c5201a44e1a4710684f3860cf1~mv2.jpg'
        ]
      },
      'dogs': {
        title: 'Dogs',
        images: [
          './assets/Children%20books/dogs/507c35_25c6b22866704e4883ec792fd40107c9~mv2_d_3300_2550_s_4_2.jpg',
          './assets/Children%20books/dogs/507c35_2ea3a458b09b49a1a32e3fdd3a9b4900~mv2_d_3300_2550_s_4_2.jpg',
          './assets/Children%20books/dogs/507c35_55eecf65e7804b82a3cdc59110217a77~mv2_d_3300_2550_s_4_2.jpg',
          './assets/Children%20books/dogs/507c35_8f90936dfa984fc28eec032f8b7affeb~mv2_d_3300_2550_s_4_2.jpg',
          './assets/Children%20books/dogs/507c35_909190c7c42841ed9fd542685ec6b644~mv2_d_3300_2550_s_4_2.jpg',
          './assets/Children%20books/dogs/507c35_bcf07dfad09046208b2cf1f5fb60c51e~mv2_d_3300_2550_s_4_2.jpg'
        ]
      },
      'nibbler': {
        title: 'Nibbler',
        images: [
          './assets/Children%20books/Nibbler/1.jpg','./assets/Children%20books/Nibbler/2.jpg','./assets/Children%20books/Nibbler/3.jpg',
          './assets/Children%20books/Nibbler/4.jpg','./assets/Children%20books/Nibbler/5.jpg','./assets/Children%20books/Nibbler/6.jpg',
          './assets/Children%20books/Nibbler/7.jpg','./assets/Children%20books/Nibbler/8.jpg','./assets/Children%20books/Nibbler/9.jpg',
          './assets/Children%20books/Nibbler/10.jpg','./assets/Children%20books/Nibbler/11.jpg'
        ]
      }
    };

    const modal = document.getElementById('bookModal');
    const modalImg = document.getElementById('modalImage');
    const modalTitle = document.getElementById('modalTitle');
    const modalCount = document.getElementById('modalCount');
    let activeBook = null;
    let index = 0;

    function renderModal() {
      const b = books[activeBook];
      modalTitle.textContent = b.title;
      modalImg.src = b.images[index];
      modalImg.alt = `${b.title} image ${index + 1}`;
      modalCount.textContent = `${index + 1} / ${b.images.length}`;
    }
    function openModal(bookKey) {
      activeBook = bookKey;
      index = 0;
      modal.classList.add('open');
      modal.setAttribute('aria-hidden','false');
      document.body.style.overflow = 'hidden';
      renderModal();
    }
    window.openBook = openModal;
    function closeModal() {
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden','true');
      document.body.style.overflow = '';
    }
    function nextImg() { const len = books[activeBook].images.length; index = (index + 1) % len; renderModal(); }
    function prevImg() { const len = books[activeBook].images.length; index = (index - 1 + len) % len; renderModal(); }

    // click handlers are attached inline on cover buttons
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalNext').addEventListener('click', nextImg);
    document.getElementById('modalPrev').addEventListener('click', prevImg);
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

    document.addEventListener('keydown', (e) => {
      if (!modal.classList.contains('open')) return;
      if (e.key === 'Escape') closeModal();
      if (e.key === 'ArrowRight') nextImg();
      if (e.key === 'ArrowLeft') prevImg();
    });

    modal.addEventListener('wheel', (e) => {
      if (!modal.classList.contains('open')) return;
      if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
        e.preventDefault();
        if (e.deltaY > 0) nextImg(); else prevImg();
      }
    }, { passive: false });
  </script>
</body>
</html>
