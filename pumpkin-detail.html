<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pumpkin — Raea Gragg</title>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat+Brush&family=Shantell+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .detail-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: var(--s4);
      text-align: center;
    }
    .detail-center h1 {
      font-family: var(--font-display);
      font-size: clamp(2.8rem, 7vw, 5rem);
      font-weight: 400;
      line-height: 1;
      margin: 0;
    }
    .detail-center > p {
      color: var(--muted);
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .14em;
      margin: 0;
    }
    .detail-actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 42px;
      padding: 0 18px;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: .74rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      transition: border-color .2s ease, color .2s ease;
    }
    .btn-back:hover { border-color: var(--ink); color: var(--ink); }
    .btn-back:focus-visible { outline: 2px solid #d6b252; outline-offset: 4px; }

    /* ── Full-page gate ── */
    .page-gate {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--paper);
    }
    .page-gate.unlocked { display: none; }
    .page-gate-card {
      width: min(92vw, 400px);
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 32px 28px 26px;
      box-shadow: 0 24px 60px rgba(0,0,0,.12);
    }
    .page-gate-card h2 {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 400;
      margin: 8px 0 10px;
      line-height: 1.02;
    }
    .page-gate-card .section-kicker { margin-bottom: 0; }
    .page-gate-card p.copy { color: var(--muted); margin: 0 0 20px; }
    .page-gate-form { display: flex; gap: 10px; flex-wrap: wrap; }
    .page-gate-form input {
      flex: 1 1 160px;
      min-width: 0;
      min-height: 42px;
      padding: 0 14px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      font: inherit;
      border-radius: 999px;
    }
    .page-gate-form input:focus { outline: 2px solid var(--accent); outline-offset: 2px; }
    .page-gate-error { min-height: 1.2em; margin: 12px 0 0; color: #8f2d2d; font-size: .85rem; }
  </style>
</head>
<body>

  <!-- Full-page gate — hidden once unlocked -->
  <div id="pageGate" class="page-gate" role="dialog" aria-modal="true" aria-labelledby="gateTitle">
    <div class="page-gate-card">
      <p class="section-kicker">Protected content</p>
      <h2 id="gateTitle">Enter password</h2>
      <p class="copy">This preview is password protected.</p>
      <form id="gateForm" class="page-gate-form">
        <label class="sr-only" for="gateInput">Password</label>
        <input id="gateInput" type="password" autocomplete="current-password" placeholder="Password" />
        <button class="btn primary" type="submit">Unlock</button>
      </form>
      <p id="gateError" class="page-gate-error" aria-live="polite"></p>
    </div>
  </div>

  <div class="wrap">
    <header>
      <div class="logo">Raea Gragg</div>
      <nav aria-label="Primary">
        <a href="./index.html#nav=home" data-hue="0.0">Home</a>
        <a href="./books.html#nav=books" data-hue="0.15">Books</a>
        <a href="./art.html#nav=art" data-hue="0.33">Art</a>
        <a class="active" href="./projects.html#nav=projects" data-hue="0.55">Upcoming</a>
        <a href="./about.html#nav=about" data-hue="0.82">About</a>
      </nav>
      <button class="nav-toggle" type="button" aria-label="Toggle menu" aria-expanded="false"><span></span><span></span><span></span></button>
    </header>

    <main>
      <div class="detail-center">
        <p>MG graphic novel</p>
        <h1>Pumpkin</h1>
        <div class="detail-actions">
          <a class="btn-back" href="./projects.html">← Back</a>
          <a class="btn primary" href="./assets/pumpkin/pumpkin_storyboard_june_%2029.pdf" target="_blank" rel="noopener">View Storyboard</a>
        </div>
      </div>
    </main>

    <footer>
      <div>© <span id="year"></span> Raea Gragg</div>
      <div style="display:flex;align-items:center;gap:12px">
        <a href="https://www.instagram.com/raeag/" target="_blank" rel="noopener" aria-label="Instagram" style="display:flex;align-items:center"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.75" fill="currentColor" stroke="none"/></svg></a>
        <a href="https://www.tiktok.com/@raeagragg" target="_blank" rel="noopener" aria-label="TikTok" style="display:flex;align-items:center"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.17 8.17 0 0 0 4.78 1.52V6.76a4.85 4.85 0 0 1-1.01-.07z"/></svg></a>
      </div>
    </footer>
  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    (function(){
      var PASSWORD = 'password';
      var gate = document.getElementById('pageGate');
      var form = document.getElementById('gateForm');
      var input = document.getElementById('gateInput');
      var error = document.getElementById('gateError');

      if (sessionStorage.getItem('raea-unlocked')) {
        gate.classList.add('unlocked');
      } else {
        setTimeout(function(){ input.focus(); }, 50);
      }

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        if (input.value === PASSWORD) {
          sessionStorage.setItem('raea-unlocked', '1');
          gate.classList.add('unlocked');
        } else {
          error.textContent = 'Incorrect password.';
          input.value = '';
          input.focus();
        }
      });
    })();
    (function(){var t=document.querySelector('.nav-toggle'),n=document.querySelector('nav[aria-label="Primary"]');if(!t||!n)return;t.addEventListener('click',function(){var o=t.getAttribute('aria-expanded')==='true';t.setAttribute('aria-expanded',String(!o));n.classList.toggle('nav-open',!o);});document.addEventListener('click',function(e){if(!t.contains(e.target)&&!n.contains(e.target)){t.setAttribute('aria-expanded','false');n.classList.remove('nav-open');}});})();
  </script>
  <script src="./texture.js"></script>
  <script src="./nav-splat.js"></script>
</body>
</html>
