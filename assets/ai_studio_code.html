<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alta Crest Gardens</title>
    <link href="https://fonts.googleapis.com/css2?family=Prata&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* Updated background to white */
        body {
            background-color: #ffffff; 
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #ffffff; /* Container also set to white */
            width: 100%;
            max-width: 1300px;
            padding: 40px 60px;
            /* Removed shadow for a "just white" clean look */
        }

        /* Navigation */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        .logo {
            font-family: 'Prata', serif;
            font-size: 28px;
            color: #1a1a1a;
        }
        nav { display: flex; gap: 40px; }
        nav a {
            text-decoration: none;
            color: #333;
            font-size: 14px;
            font-weight: 500;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .contact-btn {
            background: none;
            border: 1px solid #ddd;
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
        }

        /* Hero Image */
        .hero-img {
            width: 100%;
            height: 500px;
            object-fit: cover;
            border-radius: 30px;
            margin-bottom: 50px;
            background-image: url('https://images.unsplash.com/photo-1512411516053-12507d341b1d?q=80&w=2000&auto=format&fit=crop'); 
            background-position: center;
        }

        /* Branding Section */
        .branding-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 60px;
        }
        .title-group h1 {
            font-family: 'Prata', serif;
            font-size: 84px;
            line-height: 0.9;
            color: #1a1a1a;
        }
        .title-group p {
            font-size: 20px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-align: center;
            color: #333;
        }

        .cta-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .btn-dark {
            background-color: #2c2421;
            color: white;
            padding: 22px 45px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-group-column {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .btn-olive {
            background-color: #979d85; /* Keeping button color for brand contrast */
            color: #fff;
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-size: 13px;
            cursor: pointer;
            min-width: 160px;
        }

        /* Divider and Bottom Grid */
        hr {
            border: none;
            border-top: 1px solid #eee;
            margin-bottom: 40px;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
        }
        .grid-item h3 {
            font-size: 28px;
            margin-bottom: 20px;
            font-weight: 400;
            line-height: 1.2;
        }
        .thumbnail {
            width: 100%;
            max-width: 250px;
            height: 150px;
            border-radius: 20px;
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo">Alta</div>
            <nav>
                <a href="#">Plant Library</a>
                <a href="#">Plant Stories</a>
                <a href="#">Visit</a>
            </nav>
            <div class="header-actions">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <button class="contact-btn">Contact</button>
            </div>
        </header>

        <div class="hero-img"></div>

        <section class="branding-section">
            <div class="title-group">
                <h1>Alta Crest</h1>
                <p>Gardens</p>
            </div>
            <div class="cta-group">
                <button class="btn-dark">Call for availability</button>
                <div class="btn-group-column">
                    <button class="btn-olive">Visit Richmond</button>
                    <button class="btn-olive">Visit Fremont</button>
                </div>
            </div>
        </section>

        <hr>

        <section class="content-grid">
            <div class="grid-item">
                <h3>Visit Richmond <br> Reasons</h3>
                <div class="thumbnail" style="background-image: url('https://images.unsplash.com/photo-1545241047-6083a3684587?w=600');"></div>
            </div>
            <div class="grid-item">
                <h3>Visit Richmond <br> Visit Fremont</h3>
                <div class="thumbnail" style="background-image: url('https://images.unsplash.com/photo-1459156212016-c812468e2115?w=600');"></div>
            </div>
        </section>
    </div>

</body>
</html>
