<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Raea Gragg — Upcoming Projects</title>
  <meta name="description" content="Upcoming projects and private previews." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&family=Albert+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo">Raea Gragg<small>Author • Illustrator • Animator</small></div>
      <nav aria-label="Primary">
        <a href="./index.html">Home</a>
        <a href="./books.html">Books</a>
        <a href="./art.html">Art</a>
        <a class="active" href="./projects.html">Upcoming</a>
        <a href="./about.html">About</a>
      </nav>
    </header>

    <main>
      <section>
        <h2>Upcoming Projects</h2>
      </section>

      <section>
        <p class="section-kicker">Project Collection</p>
        <h2>Cicada Rising</h2>

        <div class="collection-strip">
          <figure onclick="openCollection('cicada', 0)">
            <img src="./assets/cicada/IMG_2950.jpeg" alt="Cicada Rising concept art 1" />
          </figure>
          <figure onclick="openCollection('cicada', 1)">
            <img src="./assets/cicada/IMG_2951.jpeg" alt="Cicada Rising concept art 2" />
          </figure>
          <figure onclick="openCollection('cicada', 2)">
            <img src="./assets/cicada/IMG_2952.jpeg" alt="Cicada Rising concept art 3" />
          </figure>
          <figure onclick="openCollection('cicada', 3)">
            <img src="./assets/cicada/IMG_2953.jpeg" alt="Cicada Rising concept art 4" />
          </figure>
          <figure onclick="openCollection('cicada', 4)">
            <img src="./assets/cicada/IMG_2954.jpeg" alt="Cicada Rising concept art 5" />
          </figure>
        </div>
      </section>

      <section>
        <p class="section-kicker">Project Collection</p>
        <h2>Pumpkin</h2>

        <div class="collection-strip">
          <figure onclick="openCollection('pumpkin', 0)">
            <img src="./assets/lil%20pump_edited.png" alt="Pumpkin concept art 1" />
          </figure>
          <figure onclick="openCollection('pumpkin', 1)">
            <img src="./assets/Mup%201%20%26%202/Raea%20and%20pump_edited.png" alt="Pumpkin concept art 2" />
          </figure>
        </div>
      </section>
    </main>

    <footer>
      <div>© <span id="year"></span> Raea Gragg</div>
      <div><a href="./index.html">Back to Home</a></div>
    </footer>
  </div>

  <div id="artModal" class="book-modal" aria-hidden="true">
    <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-count" id="modalCount"></div>
    <div class="book-modal-inner">
      <button class="modal-nav" id="modalPrev" aria-label="Previous image">←</button>
      <div class="book-modal-stage"><img id="modalImage" alt="" /></div>
      <button class="modal-nav" id="modalNext" aria-label="Next image">→</button>
    </div>
  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const collections = {
      'cicada': {
        title: 'Cicada Rising',
        images: [
          './assets/cicada/IMG_2950.jpeg',
          './assets/cicada/IMG_2951.jpeg',
          './assets/cicada/IMG_2952.jpeg',
          './assets/cicada/IMG_2953.jpeg',
          './assets/cicada/IMG_2954.jpeg'
        ]
      },
      'pumpkin': {
        title: 'Pumpkin',
        images: [
          './assets/lil%20pump_edited.png',
          './assets/Mup%201%20%26%202/Raea%20and%20pump_edited.png'
        ]
      }
    };

    const modal = document.getElementById('artModal');
    const modalImg = document.getElementById('modalImage');
    const modalTitle = document.getElementById('modalTitle');
    const modalCount = document.getElementById('modalCount');
    let activeCollection = null;
    let index = 0;

    function renderModal() {
      const c = collections[activeCollection];
      modalTitle.textContent = c.title;
      modalImg.src = c.images[index];
      modalImg.alt = `${c.title} image ${index + 1}`;
      modalCount.textContent = `${index + 1} / ${c.images.length}`;
    }

    window.openCollection = function(key, startIndex) {
      activeCollection = key;
      index = startIndex;
      modal.classList.add('open');
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      renderModal();
    };

    function closeModal() {
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    function nextImg() {
      const len = collections[activeCollection].images.length;
      index = (index + 1) % len;
      renderModal();
    }

    function prevImg() {
      const len = collections[activeCollection].images.length;
      index = (index - 1 + len) % len;
      renderModal();
    }

    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalNext').addEventListener('click', nextImg);
    document.getElementById('modalPrev').addEventListener('click', prevImg);
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

    document.addEventListener('keydown', (e) => {
      if (!modal.classList.contains('open')) return;
      if (e.key === 'Escape') closeModal();
      if (e.key === 'ArrowRight') nextImg();
      if (e.key === 'ArrowLeft') prevImg();
    });

    modal.addEventListener('wheel', (e) => {
      if (!modal.classList.contains('open')) return;
      if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
        e.preventDefault();
        if (e.deltaY > 0) nextImg(); else prevImg();
      }
    }, { passive: false });

    let touchStartX = 0;
    modal.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
    modal.addEventListener('touchend', (e) => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 40) { if (dx < 0) nextImg(); else prevImg(); }
    });
  </script>
</body>
</html>
